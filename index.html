<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Send Aid</title>
<style>
html, body {
    margin: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* base background */
body {
    background: url('kitten.jpg') no-repeat center center fixed;
    background-size: cover;
    color: white;
}

/* Greeting screen */
#greeting {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display:flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

/* semi-transparent greeting image */
#greeting img {
    position: absolute;
    top:0; left:0;
    width:100%;
    height:100%;
    object-fit: cover;
    opacity: 0.5;
    z-index: 0;
}

/* text and button on top */
#greeting h1, #greeting button {
    position: relative;
    z-index: 1;
}

#greeting h1 {
    font-size: 50px;
    margin-bottom: 30px;
    text-shadow: 2px 2px 10px black;
}

#greeting button {
    padding: 20px 40px;
    font-size: 28px;
    background-color: blue;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

/* Main content */
#main {
    display: none;
    text-align: center;
}

#main h1 {
    font-size: 60px;
    margin-top: 100px;
    text-shadow: 3px 3px 10px black;
}

#actionBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 40px;
    font-size: 24px;
    background-color: blue;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.coin {
    position: absolute;
    width: 50px;
    pointer-events: none;
    animation: fall linear;
}

@keyframes fall {
    from { transform: translateY(-100px); }
    to { transform: translateY(100vh); }
}

/* dance.gif styling */
#danceGif {
    opacity: 0; /* hidden initially */
    margin: 20px auto 0 auto; /* centered below button */
    width: 300px;
    height: auto;
    display: block;
    transition: opacity 2s ease-in-out; /* fade in */
}
</style>
</head>
<body>

<!-- Greeting Screen -->
<div id="greeting">
    <img src="yahu.jpg" alt="Greeting Image">
    <h1>Welcome!</h1>
    <button onclick="startMain()">Become a Goy</button>
</div>

<!-- Main Content -->
<div id="main">
    <h1>SEND AID TO THE GLORIOUS STATE OF ISRAEL</h1>
    <button id="actionBtn" onclick="startRain()">CLICK ME</button>
    <img id="danceGif" src="dance.gif" alt="Dance GIF">
</div>

<!-- Audio -->
<audio id="bgMusic" src="sound.mp3" loop></audio>
<audio id="clickMusic" src="sound2.mp3" loop></audio>

<script>
function startMain() {
    document.getElementById("greeting").style.display = "none";
    document.getElementById("main").style.display = "block";

    document.getElementById("bgMusic").play();
}

function startRain() {
    const bgMusic = document.getElementById("bgMusic");
    const clickMusic = document.getElementById("clickMusic");

    bgMusic.pause();

    // start sound2.mp3 at 7 seconds
    clickMusic.currentTime = 7;
    clickMusic.play();

    // fade in dance.gif below button
    const dance = document.getElementById("danceGif");
    dance.style.opacity = 1;

    // start coin rain
    let interval = setInterval(createCoin, 100);
    setTimeout(() => clearInterval(interval), 5000);
}

function createCoin() {
    const coin = document.createElement("img");
    coin.src = "coin.jpg";
    coin.className = "coin";
    coin.style.left = Math.random() * window.innerWidth + "px";
    coin.style.animationDuration = (Math.random() * 2 + 2) + "s";
    document.body.appendChild(coin);

    setTimeout(() => coin.remove(), 4000);
}
</script>

</body>
</html>
